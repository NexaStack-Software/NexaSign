<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Hintergrund-Form, freundlich rund -->
  <ellipse cx="100" cy="135" rx="80" ry="10" fill="#d1fae5" opacity="0.6"/>
  <!-- Postkarte -->
  <rect x="40" y="40" width="120" height="80" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <!-- Briefmarke-Ecke -->
  <rect x="130" y="50" width="20" height="22" rx="2" fill="#10b981" opacity="0.2"/>
  <text x="140" y="65" font-family="ui-sans-serif, system-ui" font-size="12" fill="#059669" text-anchor="middle" font-weight="bold">€</text>
  <!-- Text-Linien -->
  <rect x="50" y="80" width="80" height="3" rx="1.5" fill="#a7f3d0"/>
  <rect x="50" y="90" width="60" height="3" rx="1.5" fill="#a7f3d0"/>
  <rect x="50" y="100" width="70" height="3" rx="1.5" fill="#a7f3d0"/>
  <!-- Lächeln im Umschlag (subtil unten) -->
  <path d="M 70 60 Q 100 75 130 60" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Sternchen / Glitzer -->
  <circle cx="30" cy="30" r="3" fill="#10b981" opacity="0.5"/>
  <circle cx="170" cy="35" r="2" fill="#10b981" opacity="0.7"/>
  <circle cx="180" cy="100" r="2.5" fill="#10b981" opacity="0.4"/>
  <circle cx="20" cy="100" r="2" fill="#10b981" opacity="0.6"/>
</svg>
