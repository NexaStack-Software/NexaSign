  <rect x="90" y="20" width="50" height="32" rx="4" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="115" y="40" font-family="ui-sans-serif, system-ui" font-size="14" fill="#0284c7" text-anchor="middle" font-weight="bold">@</text>
  <rect x="20" y="58" width="50" height="32" rx="4" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
